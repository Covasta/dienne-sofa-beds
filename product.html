<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>产品详情 - Dienne 沙发床</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="product">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Dienne 首页">
        <img src="assets/logo.png" alt="Dienne" />
      </a>
      <form class="site-search" data-search-form>
        <input
          type="search"
          name="q"
          aria-label="搜索产品"
          placeholder="搜索产品名称或长度"
          autocomplete="off"
        />
        <button type="submit">搜索</button>
      </form>
    </header>

    <main data-product-detail></main>

    <footer class="site-footer">
      <img data-footer-contact src="assets/generated/footer-contact.jpg" alt="Dienne 关注我们二维码和渠道名称" />
    </footer>

    <script src="assets/catalog.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
